name: IceDip
options:
  bundleIdPrefix: com.icedip
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "9B5THFVGW7"
    SWIFT_VERSION: "6.0"

targets:
  IceDip:
    type: application
    platform: iOS
    sources:
      - path: IceDip
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.icedip.app
    info:
      path: IceDip/Resources/Info.plist
      properties:
        CFBundleDisplayName: IceDip
        UILaunchScreen:
          UIColorName: LaunchBackground

schemes:
  IceDip:
    build:
      targets:
        IceDip: all
    run:
      config: Debug
    archive:
      config: Release
